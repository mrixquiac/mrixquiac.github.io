<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media — Marcelo Ixquiac</title>
  <link rel="stylesheet" href="../../style.css" />
  <style>

    .page-header {
      padding-top:    var(--space-20);
      padding-bottom: var(--space-12);
      border-bottom:  1px solid var(--color-border);
      margin-bottom:  var(--space-14);
    }

    .page-header__back {
      display:       inline-flex;
      align-items:   center;
      gap:           var(--space-2);
      font-family:   var(--font-sans);
      font-size:     var(--text-sm);
      color:         var(--color-text-muted);
      margin-bottom: var(--space-6);
      transition:    color var(--transition-fast);
      text-decoration: none;
    }
    .page-header__back:hover { color: var(--color-accent); }
    .page-header__back:hover .arrow { transform: translateX(-3px); }
    .page-header__back .arrow { display:inline-block; transition: transform var(--transition-fast); }

    .page-header__title {
      font-size:      var(--text-4xl);
      letter-spacing: -0.025em;
      margin-top:     var(--space-4);
    }

    /* ── Filtros ── */
    .filters {
      display:       flex;
      gap:           var(--space-3);
      flex-wrap:     wrap;
      margin-bottom: var(--space-6);
    }

    .filter-btn {
      font-family:    var(--font-sans);
      font-size:      var(--text-xs);
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color:          var(--color-text-muted);
      padding:        0.35em 0.9em;
      border:         1px solid var(--color-border);
      border-radius:  100px;
      cursor:         pointer;
      background:     none;
      transition:     all var(--transition-fast);
    }
    .filter-btn:hover  { border-color: var(--color-accent); color: var(--color-accent); }
    .filter-btn.active { background: var(--color-accent); border-color: var(--color-accent); color: #fff; }

    .items-count {
      font-family:   var(--font-sans);
      font-size:     var(--text-sm);
      color:         var(--color-text-muted);
      margin-bottom: var(--space-8);
    }

    /* ── Grid ── */
    .media-grid {
      display:               grid;
      grid-template-columns: repeat(3, 1fr);
      gap:                   var(--space-5);
      margin-bottom:         var(--space-24);
    }

    /* ── Tarjeta ── */
    .media-card {
      display:        flex;
      flex-direction: column;
      border:         1px solid var(--color-border);
      border-radius:  var(--radius-lg);
      overflow:       hidden;
      background:     var(--color-bg-pure);
      cursor:         pointer;
      transition:     box-shadow var(--transition-base), transform var(--transition-base);
    }

    .media-card:hover {
      box-shadow: var(--shadow-card);
      transform:  translateY(-2px);
    }

    .media-card.hidden { display: none; }

    /* Thumbnail */
    .media-card__thumb {
      width:           100%;
      aspect-ratio:    4 / 3;
      background:      var(--color-accent-light);
      display:         flex;
      align-items:     center;
      justify-content: center;
      overflow:        hidden;
      flex-shrink:     0;
      position:        relative;
    }

    .media-card__thumb img,
    .media-card__thumb video {
      width:      100%;
      height:     100%;
      object-fit: cover;
      display:    block;
    }

    .media-card__badge {
      position:       absolute;
      top:            var(--space-3);
      left:           var(--space-3);
      font-family:    var(--font-sans);
      font-size:      0.62rem;
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color:          #fff;
      background:     var(--color-accent);
      border-radius:  100px;
      padding:        0.2em 0.65em;
    }

    .media-card__play {
      position:        absolute;
      top:             50%;
      left:            50%;
      transform:       translate(-50%, -50%);
      width:           42px;
      height:          42px;
      border-radius:   50%;
      background:      rgba(27,58,107,0.82);
      display:         flex;
      align-items:     center;
      justify-content: center;
      color:           #fff;
      font-size:       1rem;
      pointer-events:  none;
    }

    /* Cuerpo */
    .media-card__body {
      padding: var(--space-4) var(--space-5) var(--space-5);
      flex:    1;
      display: flex;
      flex-direction: column;
    }

    .media-card__meta {
      display:       flex;
      align-items:   center;
      gap:           var(--space-3);
      margin-bottom: var(--space-2);
    }

    .media-card__tipo {
      font-family:    var(--font-sans);
      font-size:      0.62rem;
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color:          var(--color-accent);
    }

    .media-card__fecha {
      font-family: var(--font-sans);
      font-size:   var(--text-xs);
      color:       var(--color-text-muted);
    }

    .media-card__title {
      font-family:   var(--font-serif);
      font-size:     var(--text-md);
      font-weight:   var(--weight-semibold);
      color:         var(--color-text);
      margin-bottom: var(--space-2);
      line-height:   var(--leading-snug);
    }

    /* Descripción recortada en tarjeta */
    .media-card__desc {
      font-family:       var(--font-sans);
      font-size:         var(--text-sm);
      color:             var(--color-text-muted);
      line-height:       var(--leading-normal);
      display:           -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow:          hidden;
      flex:              1;
    }

    .media-card__expand {
      display:        flex;
      align-items:    center;
      gap:            var(--space-1);
      margin-top:     var(--space-3);
      font-family:    var(--font-sans);
      font-size:      var(--text-xs);
      color:          var(--color-accent);
      font-weight:    var(--weight-medium);
      align-self:     flex-start;
    }

    /* ══════════════════════════════════════
       MODAL — rediseño completo
    ══════════════════════════════════════ */
    .modal-overlay {
      display:         none;
      position:        fixed;
      inset:           0;
      background:      rgba(8, 12, 20, 0.88);
      z-index:         1000;
      align-items:     center;
      justify-content: center;
      padding:         var(--space-6);
      backdrop-filter: blur(6px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background:    var(--color-bg-pure);
      border-radius: 20px;
      max-width:     960px;
      width:         100%;
      max-height:    90vh;
      position:      relative;
      box-shadow:    0 32px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06);
      animation:     modalIn 0.22s cubic-bezier(0.34,1.2,0.64,1);
      display:       grid;
      grid-template-columns: 1fr 340px;
      overflow:      hidden;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.94) translateY(12px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    /* ── Panel izquierdo: media ── */
    .modal__left {
      background:    #0a0d12;
      position:      relative;
      display:       flex;
      flex-direction: column;
      min-height:    460px;
      overflow:      hidden;
    }

    /* Carrusel */
    .modal__carousel {
      flex:       1;
      position:   relative;
      overflow:   hidden;
    }

    .modal__slide {
      position:   absolute;
      inset:      0;
      display:    flex;
      align-items:     center;
      justify-content: center;
      opacity:    0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .modal__slide.active {
      opacity:        1;
      pointer-events: auto;
    }

    .modal__slide img {
      max-width:  100%;
      max-height: 100%;
      object-fit: contain;
      display:    block;
    }

    .modal__slide video {
      width:      100%;
      max-height: 100%;
      display:    block;
    }

    /* Flechas de navegación */
    .modal__arrow {
      position:        absolute;
      top:             50%;
      transform:       translateY(-50%);
      width:           40px;
      height:          40px;
      border-radius:   50%;
      background:      rgba(255,255,255,0.12);
      border:          1px solid rgba(255,255,255,0.18);
      color:           #fff;
      display:         flex;
      align-items:     center;
      justify-content: center;
      cursor:          pointer;
      font-size:       1rem;
      z-index:         5;
      transition:      background 0.15s;
      backdrop-filter: blur(4px);
    }
    .modal__arrow:hover  { background: rgba(255,255,255,0.25); }
    .modal__arrow--prev  { left:  var(--space-4); }
    .modal__arrow--next  { right: var(--space-4); }
    .modal__arrow.hidden { display: none; }

    /* Dots indicadores */
    .modal__dots {
      display:         flex;
      justify-content: center;
      align-items:     center;
      gap:             var(--space-2);
      padding:         var(--space-4) 0;
      position:        absolute;
      bottom:          0;
      width:           100%;
    }

    .modal__dot {
      width:         7px;
      height:        7px;
      border-radius: 50%;
      background:    rgba(255,255,255,0.3);
      border:        none;
      cursor:        pointer;
      padding:       0;
      transition:    background 0.2s, transform 0.2s;
    }
    .modal__dot.active {
      background: #fff;
      transform:  scale(1.3);
    }

    /* Contador de slides */
    .modal__counter {
      position:    absolute;
      top:         var(--space-4);
      left:        var(--space-4);
      font-family: var(--font-sans);
      font-size:   var(--text-xs);
      color:       rgba(255,255,255,0.7);
      background:  rgba(0,0,0,0.45);
      padding:     0.25em 0.65em;
      border-radius: 100px;
      backdrop-filter: blur(4px);
    }
    .modal__counter.hidden { display: none; }

    /* Tabs foto/video */
    .modal__tabs {
      display:        flex;
      gap:            var(--space-1);
      padding:        var(--space-3) var(--space-4);
      background:     rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      border-bottom:  1px solid rgba(255,255,255,0.08);
      position:       relative;
      z-index:        4;
    }

    .modal__tab {
      font-family:    var(--font-sans);
      font-size:      var(--text-xs);
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color:          rgba(255,255,255,0.5);
      padding:        0.35em 0.85em;
      border-radius:  100px;
      cursor:         pointer;
      border:         1px solid transparent;
      background:     none;
      transition:     all 0.15s;
    }
    .modal__tab:hover { color: rgba(255,255,255,0.8); }
    .modal__tab.active {
      color:         #fff;
      background:    rgba(255,255,255,0.12);
      border-color:  rgba(255,255,255,0.2);
    }

    /* ── Panel derecho: info ── */
    .modal__right {
      display:        flex;
      flex-direction: column;
      overflow-y:     auto;
      padding:        var(--space-8) var(--space-7);
      border-left:    1px solid var(--color-border);
    }

    .modal__close {
      position:   absolute;
      top:        var(--space-4);
      right:      var(--space-4);
      width:      32px;
      height:     32px;
      border-radius: 50%;
      background: var(--color-bg-pure);
      border:     1px solid var(--color-border);
      display:    flex;
      align-items:     center;
      justify-content: center;
      cursor:     pointer;
      font-size:  0.85rem;
      color:      var(--color-text-muted);
      z-index:    20;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .modal__close:hover { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }

    .modal__tag {
      display:        inline-flex;
      align-items:    center;
      gap:            var(--space-2);
      font-family:    var(--font-sans);
      font-size:      0.62rem;
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color:          var(--color-accent);
      margin-bottom:  var(--space-5);
    }

    .modal__tag-dot {
      width:         6px;
      height:        6px;
      border-radius: 50%;
      background:    var(--color-accent);
      flex-shrink:   0;
    }

    .modal__title {
      font-family:    var(--font-serif);
      font-size:      var(--text-2xl);
      font-weight:    var(--weight-semibold);
      letter-spacing: -0.02em;
      line-height:    var(--leading-tight);
      color:          var(--color-text);
      margin-bottom:  var(--space-4);
    }

    .modal__fecha {
      font-family:   var(--font-sans);
      font-size:     var(--text-sm);
      color:         var(--color-text-muted);
      margin-bottom: var(--space-7);
      padding-bottom: var(--space-7);
      border-bottom: 1px solid var(--color-border);
    }

    .modal__desc {
      font-family: var(--font-serif);
      font-size:   var(--text-md);
      line-height: var(--leading-relaxed);
      color:       var(--color-text);
      flex:        1;
    }

    /* ── Responsive: en móvil apila ── */
    @media (max-width: 700px) {
      .modal {
        grid-template-columns: 1fr;
        grid-template-rows:    auto auto;
        max-height:            92vh;
        border-radius:         16px;
      }
      .modal__left  { min-height: 260px; }
      .modal__right { border-left: none; border-top: 1px solid var(--color-border); padding: var(--space-6); max-height: 45vh; }
      .modal__close { top: var(--space-3); right: var(--space-3); }
    }


    /* Responsive */
    @media (max-width: 768px) {
      .media-grid { grid-template-columns: 1fr 1fr; }
      .page-header { padding-top: var(--space-12); }
      .page-header__title { font-size: var(--text-3xl); }
      .modal { max-height: 96vh; }
      .modal__body { padding: var(--space-5) var(--space-5) var(--space-6); }
    }

    @media (max-width: 480px) {
      .media-grid { grid-template-columns: 1fr; }
    }

  </style>
</head>
<body>

  <nav class="nav" id="main-nav">
    <div class="nav__inner">
      <a href="../../index.html" class="nav__logo">Marcelo Ixquiac</a>
      <ul class="nav__links">
        <li><a href="../../about.html"    class="nav__link">Sobre mí</a></li>
        <li><a href="../../projects.html" class="nav__link">Proyectos</a></li>
        <li><a href="../../blog.html"     class="nav__link active">Blog</a></li>
        <li><a href="../../now.html"      class="nav__link">Ahora</a></li>
        <li><a href="../../contact.html"  class="nav__link">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container container--content">

      <header class="page-header">
        <a href="../../blog.html" class="page-header__back">
          <span class="arrow">←</span> Blog
        </a>
        <p class="section-label">Blog · Media</p>
        <h1 class="page-header__title">Media</h1>
      </header>

      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Todo</button>
        <button class="filter-btn" data-filter="foto">Fotos</button>
        <button class="filter-btn" data-filter="video">Videos</button>
        <button class="filter-btn" data-filter="foto+video">Foto · Video</button>
      </div>

      <p class="items-count" id="items-count"></p>
      <div class="media-grid" id="media-grid"></div>

    </div>
  </main>

  <!-- ── MODAL ── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <button class="modal__close" id="modal-close" aria-label="Cerrar">✕</button>
      <!-- Panel izquierdo: media -->
      <div class="modal__left" id="modal-left"></div>
      <!-- Panel derecho: info -->
      <div class="modal__right">
        <p class="modal__tag"><span class="modal__tag-dot"></span><span id="modal-tipo"></span></p>
        <h2 class="modal__title" id="modal-title"></h2>
        <p class="modal__fecha"  id="modal-fecha"></p>
        <p class="modal__desc"   id="modal-desc"></p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__copy">Marcelo Ixquiac &copy; 2025</p>
      <div class="footer__links">
        <a href="mailto:tu@email.com"             class="footer__link">Email</a>
        <a href="https://github.com/tuusuario"     class="footer__link" target="_blank">GitHub</a>
        <a href="https://linkedin.com/in/tuperfil" class="footer__link" target="_blank">LinkedIn</a>
      </div>
    </div>
  </footer>

  <script>
    // ── Nav ─────────────────────────────────────────
    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });


    // ── Modal con carrusel ───────────────────────────
    const overlay = document.getElementById('modal-overlay');
    let currentSlide = 0;
    let totalSlides  = 0;

    function openModal(item) {
      const archivos = item.archivos || (item.archivo ? [item.archivo] : []);
      const fotos    = archivos.filter(f => /\.(jpe?g|png|webp|gif)$/i.test(f));
      const videos   = archivos.filter(f => /\.(mp4|webm|mov)$/i.test(f));
      const base     = `blog/media/${item.slug}/`;

      const left = document.getElementById('modal-left');
      left.innerHTML = '';
      currentSlide = 0;

      // Si tiene ambos tipos → tabs
      if (fotos.length && videos.length) {
        let activeGroup = 'foto';

        function buildGroup(files, type) {
          const group = document.createElement('div');
          group.dataset.group = type;
          group.style.display = type === 'foto' ? 'flex' : 'none';
          group.style.cssText += 'flex-direction:column;height:100%;';
          buildCarousel(group, files, base, type === 'video');
          return group;
        }

        const tabBar = document.createElement('div');
        tabBar.className = 'modal__tabs';
        ['foto','video'].forEach(t => {
          const btn = document.createElement('button');
          btn.className = 'modal__tab' + (t === 'foto' ? ' active' : '');
          btn.textContent = t === 'foto' ? 'Foto' : 'Video';
          btn.addEventListener('click', () => {
            document.querySelectorAll('.modal__tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('[data-group]').forEach(g => {
              g.style.display = g.dataset.group === t ? 'flex' : 'none';
            });
          });
          tabBar.appendChild(btn);
        });

        left.appendChild(tabBar);
        left.appendChild(buildGroup(fotos, 'foto'));
        left.appendChild(buildGroup(videos, 'video'));

      } else if (fotos.length) {
        buildCarousel(left, fotos, base, false);
      } else if (videos.length) {
        buildCarousel(left, videos, base, true);
      }

      // Info panel
      document.getElementById('modal-tipo').textContent  = item.tipo;
      document.getElementById('modal-title').textContent = item.titulo;
      document.getElementById('modal-fecha').textContent = item.fecha;
      document.getElementById('modal-desc').textContent  = item.descripcion;

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function buildCarousel(container, files, base, isVideo) {
      const carousel = document.createElement('div');
      carousel.className = 'modal__carousel';
      carousel.style.flex = '1';

      files.forEach((file, i) => {
        const slide = document.createElement('div');
        slide.className = 'modal__slide' + (i === 0 ? ' active' : '');
        if (isVideo) {
          slide.innerHTML = `<video src="${base}${file}" controls playsinline style="width:100%;max-height:100%;"></video>`;
        } else {
          slide.innerHTML = `<img src="${base}${file}" alt="Imagen ${i+1}" />`;
        }
        carousel.appendChild(slide);
      });

      container.appendChild(carousel);

      // Solo si hay más de 1
      if (files.length > 1) {
        const counter = document.createElement('div');
        counter.className = 'modal__counter';
        counter.textContent = `1 / ${files.length}`;
        carousel.appendChild(counter);

        const prev = document.createElement('button');
        prev.className = 'modal__arrow modal__arrow--prev hidden';
        prev.innerHTML = '‹';
        const next = document.createElement('button');
        next.className = 'modal__arrow modal__arrow--next';
        next.innerHTML = '›';
        carousel.appendChild(prev);
        carousel.appendChild(next);

        const dotsEl = document.createElement('div');
        dotsEl.className = 'modal__dots';
        files.forEach((_, i) => {
          const dot = document.createElement('button');
          dot.className = 'modal__dot' + (i === 0 ? ' active' : '');
          dotsEl.appendChild(dot);
        });
        carousel.appendChild(dotsEl);

        let current = 0;
        const slides = carousel.querySelectorAll('.modal__slide');
        const dots   = dotsEl.querySelectorAll('.modal__dot');

        function goTo(n) {
          slides[current].classList.remove('active');
          dots[current].classList.remove('active');
          current = (n + files.length) % files.length;
          slides[current].classList.add('active');
          dots[current].classList.add('active');
          counter.textContent = `${current + 1} / ${files.length}`;
          prev.classList.toggle('hidden', current === 0);
          next.classList.toggle('hidden', current === files.length - 1);
        }

        prev.addEventListener('click', () => goTo(current - 1));
        next.addEventListener('click', () => goTo(current + 1));
        dots.forEach((dot, i) => dot.addEventListener('click', () => goTo(i)));
      }
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => {
        document.getElementById('modal-left').innerHTML = '';
      }, 200);
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });


    // ── Construir tarjeta ────────────────────────────
    function buildCard(item) {
      const card = document.createElement('div');
      card.className  = 'media-card';
      card.dataset.tipo = item.tipo;

      const archivos = item.archivos || (item.archivo ? [item.archivo] : []);
      const primerArchivo = archivos[0] || '';
      const esVideo = /\.(mp4|webm|mov)$/i.test(primerArchivo);
      const esFoto  = /\.(jpe?g|png|webp|gif)$/i.test(primerArchivo);

      let thumbHtml = '';
      if (esFoto) {
        thumbHtml = `<img src="${item.slug}/${primerArchivo}" alt="${item.titulo}" loading="lazy" />`;
      } else if (esVideo) {
        thumbHtml = `
          <video src="${item.slug}/${primerArchivo}" muted playsinline preload="metadata"
            style="pointer-events:none;"></video>
          <div class="media-card__play">▶</div>`;
      }
      if (item.destacado) thumbHtml += `<span class="media-card__badge">Destacado</span>`;

      card.innerHTML = `
        <div class="media-card__thumb">${thumbHtml}</div>
        <div class="media-card__body">
          <div class="media-card__meta">
            <span class="media-card__tipo">${item.tipo}</span>
            <span class="media-card__fecha">${item.fecha}</span>
          </div>
          <p class="media-card__title">${item.titulo}</p>
          <p class="media-card__desc">${item.descripcion}</p>
          <span class="media-card__expand">Ver más →</span>
        </div>`;

      card.addEventListener('click', () => openModal(item));
      return card;
    }

    // ── Cargar y renderizar ──────────────────────────
    fetch('media.json')
      .then(r => r.json())
      .then(items => {
        const grid    = document.getElementById('media-grid');
        const countEl = document.getElementById('items-count');

        const sorted = items.filter(i => i.destacado)
          .concat(items.filter(i => !i.destacado));

        sorted.forEach(item => grid.appendChild(buildCard(item)));
        countEl.textContent = `${items.length} publicación${items.length !== 1 ? 'es' : ''}`;

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filter = btn.dataset.filter;
            let visible  = 0;
            document.querySelectorAll('.media-card').forEach(c => {
              const show = filter === 'all' || c.dataset.tipo === filter;
              c.classList.toggle('hidden', !show);
              if (show) visible++;
            });
            countEl.textContent = `${visible} publicación${visible !== 1 ? 'es' : ''}`;
          });
        });
      })
      .catch(() => {
        document.getElementById('media-grid').innerHTML =
          `<p style="font-family:var(--font-sans);font-size:var(--text-sm);
           color:var(--color-text-muted);grid-column:1/-1;padding:var(--space-4) 0;">
           Usa <code>python -m http.server</code> para ver el contenido.</p>`;
      });
  </script>

</body>
</html>
