<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media — Marcelo Ixquiac</title>
  <link rel="stylesheet" href="../../style.css" />
  <style>

    .page-header {
      padding-top:    var(--space-20);
      padding-bottom: var(--space-12);
      border-bottom:  1px solid var(--color-border);
      margin-bottom:  var(--space-14);
    }

    .page-header__back {
      display:       inline-flex;
      align-items:   center;
      gap:           var(--space-2);
      font-family:   var(--font-sans);
      font-size:     var(--text-sm);
      color:         var(--color-text-muted);
      margin-bottom: var(--space-6);
      transition:    color var(--transition-fast);
      text-decoration: none;
    }
    .page-header__back:hover { color: var(--color-accent); }
    .page-header__back:hover .arrow { transform: translateX(-3px); }
    .page-header__back .arrow { display:inline-block; transition: transform var(--transition-fast); }

    .page-header__title {
      font-size:      var(--text-4xl);
      letter-spacing: -0.025em;
      margin-top:     var(--space-4);
    }

    /* ── Filtros ── */
    .filters {
      display:       flex;
      gap:           var(--space-3);
      flex-wrap:     wrap;
      margin-bottom: var(--space-6);
    }

    .filter-btn {
      font-family:    var(--font-sans);
      font-size:      var(--text-xs);
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color:          var(--color-text-muted);
      padding:        0.35em 0.9em;
      border:         1px solid var(--color-border);
      border-radius:  100px;
      cursor:         pointer;
      background:     none;
      transition:     all var(--transition-fast);
    }
    .filter-btn:hover  { border-color: var(--color-accent); color: var(--color-accent); }
    .filter-btn.active { background: var(--color-accent); border-color: var(--color-accent); color: #fff; }

    .items-count {
      font-family:   var(--font-sans);
      font-size:     var(--text-sm);
      color:         var(--color-text-muted);
      margin-bottom: var(--space-8);
    }

    /* ── Grid ── */
    .media-grid {
      display:               grid;
      grid-template-columns: repeat(3, 1fr);
      gap:                   var(--space-5);
      margin-bottom:         var(--space-24);
    }

    /* ── Tarjeta ── */
    .media-card {
      display:        flex;
      flex-direction: column;
      border:         1px solid var(--color-border);
      border-radius:  var(--radius-lg);
      overflow:       hidden;
      background:     var(--color-bg-pure);
      cursor:         pointer;
      transition:     box-shadow var(--transition-base), transform var(--transition-base);
    }

    .media-card:hover {
      box-shadow: var(--shadow-card);
      transform:  translateY(-2px);
    }

    .media-card.hidden { display: none; }

    /* Thumbnail */
    .media-card__thumb {
      width:           100%;
      aspect-ratio:    4 / 3;
      background:      var(--color-accent-light);
      display:         flex;
      align-items:     center;
      justify-content: center;
      overflow:        hidden;
      flex-shrink:     0;
      position:        relative;
    }

    .media-card__thumb img,
    .media-card__thumb video {
      width:      100%;
      height:     100%;
      object-fit: cover;
      display:    block;
    }

    .media-card__badge {
      position:       absolute;
      top:            var(--space-3);
      left:           var(--space-3);
      font-family:    var(--font-sans);
      font-size:      0.62rem;
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color:          #fff;
      background:     var(--color-accent);
      border-radius:  100px;
      padding:        0.2em 0.65em;
    }

    .media-card__play {
      position:        absolute;
      top:             50%;
      left:            50%;
      transform:       translate(-50%, -50%);
      width:           42px;
      height:          42px;
      border-radius:   50%;
      background:      rgba(27,58,107,0.82);
      display:         flex;
      align-items:     center;
      justify-content: center;
      color:           #fff;
      font-size:       1rem;
      pointer-events:  none;
    }

    /* Cuerpo */
    .media-card__body {
      padding: var(--space-4) var(--space-5) var(--space-5);
      flex:    1;
      display: flex;
      flex-direction: column;
    }

    .media-card__meta {
      display:       flex;
      align-items:   center;
      gap:           var(--space-3);
      margin-bottom: var(--space-2);
    }

    .media-card__tipo {
      font-family:    var(--font-sans);
      font-size:      0.62rem;
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color:          var(--color-accent);
    }

    .media-card__fecha {
      font-family: var(--font-sans);
      font-size:   var(--text-xs);
      color:       var(--color-text-muted);
    }

    .media-card__title {
      font-family:   var(--font-serif);
      font-size:     var(--text-md);
      font-weight:   var(--weight-semibold);
      color:         var(--color-text);
      margin-bottom: var(--space-2);
      line-height:   var(--leading-snug);
    }

    /* Descripción recortada en tarjeta */
    .media-card__desc {
      font-family:       var(--font-sans);
      font-size:         var(--text-sm);
      color:             var(--color-text-muted);
      line-height:       var(--leading-normal);
      display:           -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow:          hidden;
      flex:              1;
    }

    .media-card__expand {
      display:        flex;
      align-items:    center;
      gap:            var(--space-1);
      margin-top:     var(--space-3);
      font-family:    var(--font-sans);
      font-size:      var(--text-xs);
      color:          var(--color-accent);
      font-weight:    var(--weight-medium);
      align-self:     flex-start;
    }

    /* ══════════════════════════════════════
       MODAL
    ══════════════════════════════════════ */
    .modal-overlay {
      display:          none;
      position:         fixed;
      inset:            0;
      background:       rgba(10, 14, 20, 0.82);
      z-index:          1000;
      align-items:      center;
      justify-content:  center;
      padding:          var(--space-6);
      backdrop-filter:  blur(4px);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background:    var(--color-bg-pure);
      border-radius: var(--radius-xl, 16px);
      max-width:     820px;
      width:         100%;
      max-height:    90vh;
      overflow-y:    auto;
      position:      relative;
      box-shadow:    0 24px 64px rgba(0,0,0,0.35);
      animation:     modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }

    .modal__close {
      position:    absolute;
      top:         var(--space-4);
      right:       var(--space-4);
      width:       34px;
      height:      34px;
      border:      1px solid var(--color-border);
      border-radius: 50%;
      background:  var(--color-bg-pure);
      display:     flex;
      align-items: center;
      justify-content: center;
      cursor:      pointer;
      font-size:   1rem;
      color:       var(--color-text-muted);
      z-index:     10;
      transition:  background var(--transition-fast), color var(--transition-fast);
    }

    .modal__close:hover {
      background: var(--color-accent);
      color:      #fff;
      border-color: var(--color-accent);
    }

    /* Media dentro del modal */
    .modal__media {
      width:      100%;
      background: #000;
      border-radius: var(--radius-xl, 16px) var(--radius-xl, 16px) 0 0;
      overflow:   hidden;
      max-height: 480px;
      display:    flex;
      align-items: center;
      justify-content: center;
    }

    .modal__media img {
      width:      100%;
      max-height: 480px;
      object-fit: contain;
      display:    block;
    }

    .modal__media video {
      width:      100%;
      max-height: 480px;
      display:    block;
    }

    /* Varios archivos (foto+video) */
    .modal__media-tabs {
      display:        flex;
      gap:            var(--space-2);
      padding:        var(--space-4) var(--space-6) 0;
      border-bottom:  1px solid var(--color-border);
      background:     var(--color-bg-pure);
    }

    .modal__media-tab {
      font-family:    var(--font-sans);
      font-size:      var(--text-xs);
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color:          var(--color-text-muted);
      padding:        0.4em 0.8em;
      border-radius:  var(--radius-sm);
      cursor:         pointer;
      border:         none;
      background:     none;
      border-bottom:  2px solid transparent;
      margin-bottom:  -1px;
    }

    .modal__media-tab.active {
      color:        var(--color-accent);
      border-bottom-color: var(--color-accent);
    }

    .modal__body {
      padding: var(--space-7) var(--space-8) var(--space-8);
    }

    .modal__meta {
      display:       flex;
      align-items:   center;
      gap:           var(--space-3);
      margin-bottom: var(--space-3);
    }

    .modal__tipo {
      font-family:    var(--font-sans);
      font-size:      0.62rem;
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color:          var(--color-accent);
    }

    .modal__fecha {
      font-family: var(--font-sans);
      font-size:   var(--text-xs);
      color:       var(--color-text-muted);
    }

    .modal__title {
      font-family:   var(--font-serif);
      font-size:     var(--text-2xl);
      font-weight:   var(--weight-semibold);
      letter-spacing: -0.015em;
      color:         var(--color-text);
      margin-bottom: var(--space-5);
      line-height:   var(--leading-snug);
    }

    .modal__desc {
      font-family: var(--font-serif);
      font-size:   var(--text-md);
      color:       var(--color-text);
      line-height: var(--leading-relaxed);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .media-grid { grid-template-columns: 1fr 1fr; }
      .page-header { padding-top: var(--space-12); }
      .page-header__title { font-size: var(--text-3xl); }
      .modal { max-height: 96vh; }
      .modal__body { padding: var(--space-5) var(--space-5) var(--space-6); }
    }

    @media (max-width: 480px) {
      .media-grid { grid-template-columns: 1fr; }
    }

  </style>
</head>
<body>

  <nav class="nav" id="main-nav">
    <div class="nav__inner">
      <a href="../../index.html" class="nav__logo">Marcelo Ixquiac</a>
      <ul class="nav__links">
        <li><a href="../../about.html"    class="nav__link">Sobre mí</a></li>
        <li><a href="../../projects.html" class="nav__link">Proyectos</a></li>
        <li><a href="../../blog.html"     class="nav__link active">Blog</a></li>
        <li><a href="../../now.html"      class="nav__link">Ahora</a></li>
        <li><a href="../../contact.html"  class="nav__link">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container container--content">

      <header class="page-header">
        <a href="../../blog.html" class="page-header__back">
          <span class="arrow">←</span> Blog
        </a>
        <p class="section-label">Blog · Media</p>
        <h1 class="page-header__title">Media</h1>
      </header>

      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Todo</button>
        <button class="filter-btn" data-filter="foto">Fotos</button>
        <button class="filter-btn" data-filter="video">Videos</button>
        <button class="filter-btn" data-filter="foto+video">Foto · Video</button>
      </div>

      <p class="items-count" id="items-count"></p>
      <div class="media-grid" id="media-grid"></div>

    </div>
  </main>

  <!-- ── MODAL ── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <button class="modal__close" id="modal-close" aria-label="Cerrar">✕</button>
      <div class="modal__media" id="modal-media"></div>
      <div class="modal__body">
        <div class="modal__meta">
          <span class="modal__tipo" id="modal-tipo"></span>
          <span class="modal__fecha" id="modal-fecha"></span>
        </div>
        <h2 class="modal__title" id="modal-title"></h2>
        <p class="modal__desc"  id="modal-desc"></p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__copy">Marcelo Ixquiac &copy; 2025</p>
      <div class="footer__links">
        <a href="mailto:tu@email.com"             class="footer__link">Email</a>
        <a href="https://github.com/tuusuario"     class="footer__link" target="_blank">GitHub</a>
        <a href="https://linkedin.com/in/tuperfil" class="footer__link" target="_blank">LinkedIn</a>
      </div>
    </div>
  </footer>

  <script>
    // ── Nav ─────────────────────────────────────────
    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });

    // ── Modal ────────────────────────────────────────
    const overlay    = document.getElementById('modal-overlay');
    const modalMedia = document.getElementById('modal-media');
    const modalTipo  = document.getElementById('modal-tipo');
    const modalFecha = document.getElementById('modal-fecha');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc  = document.getElementById('modal-desc');

    function openModal(item) {
      // Construir media
      modalMedia.innerHTML = buildModalMedia(item);

      // Textos
      modalTipo.textContent  = item.tipo;
      modalFecha.textContent = '· ' + item.fecha;
      modalTitle.textContent = item.titulo;
      modalDesc.textContent  = item.descripcion;

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      // Tabs si tiene foto+video
      setupTabs();
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      modalMedia.innerHTML = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function buildModalMedia(item) {
      const archivos = item.archivos || (item.archivo ? [item.archivo] : []);
      const fotos  = archivos.filter(f => /\.(jpe?g|png|webp|gif)$/i.test(f));
      const videos = archivos.filter(f => /\.(mp4|webm|mov)$/i.test(f));
      const base   = `${item.slug}/`;

      let html = '';

      // Si hay ambos: tabs
      if (fotos.length && videos.length) {
        html += `<div class="modal__media-tabs" id="media-tabs">
          <button class="modal__media-tab active" data-target="tab-foto">Foto</button>
          <button class="modal__media-tab"        data-target="tab-video">Video</button>
        </div>
        <div id="tab-foto">
          ${fotos.map(f => `<img src="${base}${f}" alt="${item.titulo}" />`).join('')}
        </div>
        <div id="tab-video" style="display:none;">
          ${videos.map(v => `<video src="${base}${v}" controls playsinline></video>`).join('')}
        </div>`;
      } else if (fotos.length) {
        html = fotos.map(f => `<img src="${base}${f}" alt="${item.titulo}" />`).join('');
      } else if (videos.length) {
        html = videos.map(v => `<video src="${base}${v}" controls playsinline></video>`).join('');
      }

      return html;
    }

    function setupTabs() {
      const tabs = document.querySelectorAll('.modal__media-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const target = tab.dataset.target;
          document.querySelectorAll('[id^="tab-"]').forEach(el => {
            el.style.display = el.id === target ? '' : 'none';
          });
        });
      });
    }

    // ── Construir tarjeta ────────────────────────────
    function buildCard(item) {
      const card = document.createElement('div');
      card.className  = 'media-card';
      card.dataset.tipo = item.tipo;

      const archivos = item.archivos || (item.archivo ? [item.archivo] : []);
      const primerArchivo = archivos[0] || '';
      const esVideo = /\.(mp4|webm|mov)$/i.test(primerArchivo);
      const esFoto  = /\.(jpe?g|png|webp|gif)$/i.test(primerArchivo);

      let thumbHtml = '';
      if (esFoto) {
        thumbHtml = `<img src="${item.slug}/${primerArchivo}" alt="${item.titulo}" loading="lazy" />`;
      } else if (esVideo) {
        thumbHtml = `
          <video src="${item.slug}/${primerArchivo}" muted playsinline preload="metadata"
            style="pointer-events:none;"></video>
          <div class="media-card__play">▶</div>`;
      }
      if (item.destacado) thumbHtml += `<span class="media-card__badge">Destacado</span>`;

      card.innerHTML = `
        <div class="media-card__thumb">${thumbHtml}</div>
        <div class="media-card__body">
          <div class="media-card__meta">
            <span class="media-card__tipo">${item.tipo}</span>
            <span class="media-card__fecha">${item.fecha}</span>
          </div>
          <p class="media-card__title">${item.titulo}</p>
          <p class="media-card__desc">${item.descripcion}</p>
          <span class="media-card__expand">Ver más →</span>
        </div>`;

      card.addEventListener('click', () => openModal(item));
      return card;
    }

    // ── Cargar y renderizar ──────────────────────────
    fetch('media.json')
      .then(r => r.json())
      .then(items => {
        const grid    = document.getElementById('media-grid');
        const countEl = document.getElementById('items-count');

        const sorted = items.filter(i => i.destacado)
          .concat(items.filter(i => !i.destacado));

        sorted.forEach(item => grid.appendChild(buildCard(item)));
        countEl.textContent = `${items.length} publicación${items.length !== 1 ? 'es' : ''}`;

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filter = btn.dataset.filter;
            let visible  = 0;
            document.querySelectorAll('.media-card').forEach(c => {
              const show = filter === 'all' || c.dataset.tipo === filter;
              c.classList.toggle('hidden', !show);
              if (show) visible++;
            });
            countEl.textContent = `${visible} publicación${visible !== 1 ? 'es' : ''}`;
          });
        });
      })
      .catch(() => {
        document.getElementById('media-grid').innerHTML =
          `<p style="font-family:var(--font-sans);font-size:var(--text-sm);
           color:var(--color-text-muted);grid-column:1/-1;padding:var(--space-4) 0;">
           Usa <code>python -m http.server</code> para ver el contenido.</p>`;
      });
  </script>

</body>
</html>
