<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Marcelo Ixquiac</title>
  <meta name="description" content="Ensayos, fotografía, video y frases." />
  <link rel="stylesheet" href="style.css" />
  <style>

    .page-header {
      padding-top:    var(--space-20);
      padding-bottom: var(--space-12);
      border-bottom:  1px solid var(--color-border);
      margin-bottom:  var(--space-20);
    }

    .page-header__title {
      font-size:      var(--text-4xl);
      letter-spacing: -0.025em;
      margin-bottom:  var(--space-5);
      margin-top:     var(--space-4);
    }

    .page-header__lead {
      max-width:   520px;
      color:       var(--color-text-muted);
      font-size:   var(--text-md);
      line-height: var(--leading-relaxed);
    }

    /* ── Bloque de cada sección ── */
    .blog-section {
      margin-bottom: var(--space-24);
    }

    .blog-section__header {
      display:         flex;
      align-items:     baseline;
      justify-content: space-between;
      padding-bottom:  var(--space-6);
      border-bottom:   1px solid var(--color-border);
      margin-bottom:   var(--space-10);
    }

    .blog-section__title {
      font-family:    var(--font-serif);
      font-size:      var(--text-2xl);
      font-weight:    var(--weight-semibold);
      letter-spacing: -0.015em;
    }

    /* ── Grid de media (3 columnas) ── */
    .media-grid {
      display:               grid;
      grid-template-columns: repeat(3, 1fr);
      gap:                   var(--space-6);
    }

    .media-card {
      display:        flex;
      flex-direction: column;
      border:         1px solid var(--color-border);
      border-radius:  var(--radius-lg);
      overflow:       hidden;
      background:     var(--color-bg-pure);
      transition:     box-shadow var(--transition-base);
      text-decoration: none;
    }

    .media-card:hover {
      box-shadow: var(--shadow-card);
    }

    .media-card__thumb {
      width:           100%;
      aspect-ratio:    4 / 3;
      background:      var(--color-accent-light);
      display:         flex;
      align-items:     center;
      justify-content: center;
      overflow:        hidden;
      flex-shrink:     0;
    }

    .media-card__thumb img,
    .media-card__thumb video {
      width:      100%;
      height:     100%;
      object-fit: cover;
    }

    .media-card__thumb-placeholder {
      font-family: var(--font-sans);
      font-size:   var(--text-xs);
      color:       var(--color-text-muted);
    }

    .media-card__body {
      padding: var(--space-5);
    }

    .media-card__title {
      font-family:   var(--font-serif);
      font-size:     var(--text-md);
      font-weight:   var(--weight-semibold);
      color:         var(--color-text);
      margin-bottom: var(--space-2);
      line-height:   var(--leading-snug);
      transition:    color var(--transition-fast);
    }

    .media-card:hover .media-card__title {
      color: var(--color-accent);
    }

    .media-card__desc {
      font-family: var(--font-sans);
      font-size:   var(--text-sm);
      color:       var(--color-text-muted);
      line-height: var(--leading-normal);
    }

    /* ── Frases preview ── */
    .frases-preview {
      display:        flex;
      flex-direction: column;
      gap:            0;
    }

    .frase-preview-item {
      padding:       var(--space-6) 0;
      border-bottom: 1px solid var(--color-border);
    }

    .frase-preview-item:first-child {
      border-top: 1px solid var(--color-border);
    }

    .frase-preview-item__text {
      font-family:  var(--font-serif);
      font-size:    var(--text-lg);
      font-style:   italic;
      color:        var(--color-text);
      line-height:  var(--leading-relaxed);
      margin-bottom: var(--space-2);
    }

    .frase-preview-item__author {
      font-family: var(--font-sans);
      font-size:   var(--text-sm);
      color:       var(--color-text-muted);
    }

    /* ── Ensayos preview ── */
    .ensayo-preview-item {
      display:     grid;
      grid-template-columns: 80px 1fr;
      gap:         var(--space-6);
      align-items: start;
      padding:     var(--space-6) 0;
      border-bottom: 1px solid var(--color-border);
      text-decoration: none;
    }

    .ensayo-preview-item:first-child {
      border-top: 1px solid var(--color-border);
    }

    .ensayo-preview-item__date {
      font-family: var(--font-sans);
      font-size:   var(--text-sm);
      color:       var(--color-text-muted);
      padding-top: 0.2em;
    }

    .ensayo-preview-item__title {
      font-family:   var(--font-serif);
      font-size:     var(--text-xl);
      font-weight:   var(--weight-semibold);
      color:         var(--color-text);
      margin-bottom: var(--space-2);
      line-height:   var(--leading-snug);
      transition:    color var(--transition-fast);
    }

    .ensayo-preview-item:hover .ensayo-preview-item__title {
      color: var(--color-accent);
    }

    .ensayo-preview-item__excerpt {
      font-family: var(--font-sans);
      font-size:   var(--text-sm);
      color:       var(--color-text-muted);
      line-height: var(--leading-normal);
    }

    @media (max-width: 768px) {
      .media-grid { grid-template-columns: 1fr 1fr; }
      .page-header { padding-top: var(--space-12); margin-bottom: var(--space-16); }
      .page-header__title { font-size: var(--text-3xl); }
    }

/* ══════════════════════════════════════
       MODAL — rediseño completo
    ══════════════════════════════════════ */
    .modal-overlay {
      display:         none;
      position:        fixed;
      inset:           0;
      background:      rgba(8, 12, 20, 0.88);
      z-index:         1000;
      align-items:     center;
      justify-content: center;
      padding:         var(--space-6);
      backdrop-filter: blur(6px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background:    var(--color-bg-pure);
      border-radius: 20px;
      max-width:     960px;
      width:         100%;
      max-height:    90vh;
      position:      relative;
      box-shadow:    0 32px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06);
      animation:     modalIn 0.22s cubic-bezier(0.34,1.2,0.64,1);
      display:       grid;
      grid-template-columns: 1fr 340px;
      overflow:      hidden;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.94) translateY(12px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    /* ── Panel izquierdo: media ── */
    .modal__left {
      background:    #0a0d12;
      position:      relative;
      display:       flex;
      flex-direction: column;
      min-height:    460px;
      overflow:      hidden;
    }

    /* Carrusel */
    .modal__carousel {
      flex:       1;
      position:   relative;
      overflow:   hidden;
    }

    .modal__slide {
      position:   absolute;
      inset:      0;
      display:    flex;
      align-items:     center;
      justify-content: center;
      opacity:    0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .modal__slide.active {
      opacity:        1;
      pointer-events: auto;
    }

    .modal__slide img {
      max-width:  100%;
      max-height: 100%;
      object-fit: contain;
      display:    block;
    }

    .modal__slide video {
      width:      100%;
      max-height: 100%;
      display:    block;
    }

    /* Flechas de navegación */
    .modal__arrow {
      position:        absolute;
      top:             50%;
      transform:       translateY(-50%);
      width:           40px;
      height:          40px;
      border-radius:   50%;
      background:      rgba(255,255,255,0.12);
      border:          1px solid rgba(255,255,255,0.18);
      color:           #fff;
      display:         flex;
      align-items:     center;
      justify-content: center;
      cursor:          pointer;
      font-size:       1rem;
      z-index:         5;
      transition:      background 0.15s;
      backdrop-filter: blur(4px);
    }
    .modal__arrow:hover  { background: rgba(255,255,255,0.25); }
    .modal__arrow--prev  { left:  var(--space-4); }
    .modal__arrow--next  { right: var(--space-4); }
    .modal__arrow.hidden { display: none; }

    /* Dots indicadores */
    .modal__dots {
      display:         flex;
      justify-content: center;
      align-items:     center;
      gap:             var(--space-2);
      padding:         var(--space-4) 0;
      position:        absolute;
      bottom:          0;
      width:           100%;
    }

    .modal__dot {
      width:         7px;
      height:        7px;
      border-radius: 50%;
      background:    rgba(255,255,255,0.3);
      border:        none;
      cursor:        pointer;
      padding:       0;
      transition:    background 0.2s, transform 0.2s;
    }
    .modal__dot.active {
      background: #fff;
      transform:  scale(1.3);
    }

    /* Contador de slides */
    .modal__counter {
      position:    absolute;
      top:         var(--space-4);
      left:        var(--space-4);
      font-family: var(--font-sans);
      font-size:   var(--text-xs);
      color:       rgba(255,255,255,0.7);
      background:  rgba(0,0,0,0.45);
      padding:     0.25em 0.65em;
      border-radius: 100px;
      backdrop-filter: blur(4px);
    }
    .modal__counter.hidden { display: none; }

    /* Tabs foto/video */
    .modal__tabs {
      display:        flex;
      gap:            var(--space-1);
      padding:        var(--space-3) var(--space-4);
      background:     rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      border-bottom:  1px solid rgba(255,255,255,0.08);
      position:       relative;
      z-index:        4;
    }

    .modal__tab {
      font-family:    var(--font-sans);
      font-size:      var(--text-xs);
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color:          rgba(255,255,255,0.5);
      padding:        0.35em 0.85em;
      border-radius:  100px;
      cursor:         pointer;
      border:         1px solid transparent;
      background:     none;
      transition:     all 0.15s;
    }
    .modal__tab:hover { color: rgba(255,255,255,0.8); }
    .modal__tab.active {
      color:         #fff;
      background:    rgba(255,255,255,0.12);
      border-color:  rgba(255,255,255,0.2);
    }

    /* ── Panel derecho: info ── */
    .modal__right {
      display:        flex;
      flex-direction: column;
      overflow-y:     auto;
      padding:        var(--space-8) var(--space-7);
      border-left:    1px solid var(--color-border);
    }

    .modal__close {
      position:   absolute;
      top:        var(--space-4);
      right:      var(--space-4);
      width:      32px;
      height:     32px;
      border-radius: 50%;
      background: var(--color-bg-pure);
      border:     1px solid var(--color-border);
      display:    flex;
      align-items:     center;
      justify-content: center;
      cursor:     pointer;
      font-size:  0.85rem;
      color:      var(--color-text-muted);
      z-index:    20;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .modal__close:hover { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }

    .modal__tag {
      display:        inline-flex;
      align-items:    center;
      gap:            var(--space-2);
      font-family:    var(--font-sans);
      font-size:      0.62rem;
      font-weight:    var(--weight-semibold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color:          var(--color-accent);
      margin-bottom:  var(--space-5);
    }

    .modal__tag-dot {
      width:         6px;
      height:        6px;
      border-radius: 50%;
      background:    var(--color-accent);
      flex-shrink:   0;
    }

    .modal__title {
      font-family:    var(--font-serif);
      font-size:      var(--text-2xl);
      font-weight:    var(--weight-semibold);
      letter-spacing: -0.02em;
      line-height:    var(--leading-tight);
      color:          var(--color-text);
      margin-bottom:  var(--space-4);
    }

    .modal__fecha {
      font-family:   var(--font-sans);
      font-size:     var(--text-sm);
      color:         var(--color-text-muted);
      margin-bottom: var(--space-7);
      padding-bottom: var(--space-7);
      border-bottom: 1px solid var(--color-border);
    }

    .modal__desc {
      font-family: var(--font-serif);
      font-size:   var(--text-md);
      line-height: var(--leading-relaxed);
      color:       var(--color-text);
      flex:        1;
    }

    /* ── Responsive: en móvil apila ── */
    @media (max-width: 700px) {
      .modal {
        grid-template-columns: 1fr;
        grid-template-rows:    auto auto;
        max-height:            92vh;
        border-radius:         16px;
      }
      .modal__left  { min-height: 260px; }
      .modal__right { border-left: none; border-top: 1px solid var(--color-border); padding: var(--space-6); max-height: 45vh; }
      .modal__close { top: var(--space-3); right: var(--space-3); }
    }

    .media-card { cursor: pointer; }


    @media (max-width: 768px) {
      .modal { max-height: 96vh; }
      .modal__body { padding: var(--space-5) var(--space-5) var(--space-6); }
    }

    @media (max-width: 480px) {
      .media-grid { grid-template-columns: 1fr; }
      .ensayo-preview-item { grid-template-columns: 1fr; gap: var(--space-2); }
      .ensayo-preview-item__date { font-size: var(--text-xs); }
    }

  </style>
</head>
<body>

  <nav class="nav" id="main-nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Tu Nombre</a>
      <ul class="nav__links">
        <li><a href="about.html"    class="nav__link">Sobre mí</a></li>
        <li><a href="projects.html" class="nav__link">Proyectos</a></li>
        <li><a href="blog.html"     class="nav__link active">Blog</a></li>
        <li><a href="now.html"      class="nav__link">Ahora</a></li>
        <li><a href="contact.html"  class="nav__link">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container container--content">

      <header class="page-header">
        <p class="section-label">Blog</p>
        <h1 class="page-header__title">Escritura, imagen y pensamiento</h1>
        <p class="page-header__lead">
          Un espacio para ensayos, fotografía, video y frases que vale
          la pena guardar.
        </p>
      </header>

      <!-- ── MEDIA ──────────────────────────────── -->
      <section class="blog-section" id="section-media">
        <div class="blog-section__header">
          <h2 class="blog-section__title">Media</h2>
          <a href="blog/media/index.html" class="cta" style="font-size:var(--text-sm);">
            Ver todo <span class="arrow">→</span>
          </a>
        </div>
        <!-- Cargado desde media.json -->
        <div class="media-grid" id="media-preview"></div>
      </section>

      <!-- ── FRASES ─────────────────────────────── -->
      <section class="blog-section" id="section-frases">
        <div class="blog-section__header">
          <h2 class="blog-section__title">Frases</h2>
          <a href="blog/frases/index.html" class="cta" style="font-size:var(--text-sm);">
            Ver todo <span class="arrow">→</span>
          </a>
        </div>
        <!-- Cargado desde frases.json -->
        <div class="frases-preview" id="frases-preview"></div>
      </section>

      <!-- ── ENSAYOS ────────────────────────────── -->
      <section class="blog-section" id="section-ensayos">
        <div class="blog-section__header">
          <h2 class="blog-section__title">Ensayos</h2>
          <a href="blog/ensayos/index.html" class="cta" style="font-size:var(--text-sm);">
            Ver todo <span class="arrow">→</span>
          </a>
        </div>
        <!-- Cargado desde ensayos.json -->
        <div id="ensayos-preview"></div>
      </section>

    </div>
  </main>

  <!-- ── MODAL MEDIA ── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <button class="modal__close" id="modal-close">✕</button>
      <div class="modal__left" id="modal-left"></div>
      <div class="modal__right">
        <p class="modal__tag"><span class="modal__tag-dot"></span><span id="modal-tipo"></span></p>
        <h2 class="modal__title" id="modal-title"></h2>
        <p class="modal__fecha"  id="modal-fecha"></p>
        <p class="modal__desc"   id="modal-desc"></p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__copy">Tu Nombre &copy; 2025</p>
      <div class="footer__links">
        <a href="mailto:tu@email.com"             class="footer__link">Email</a>
        <a href="https://github.com/tuusuario"     class="footer__link" target="_blank">GitHub</a>
        <a href="https://linkedin.com/in/tuperfil" class="footer__link" target="_blank">LinkedIn</a>
      </div>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });

    // ── Helpers ─────────────────────────────────
    function empty(el, msg) {
      el.innerHTML = `<p style="font-family:var(--font-sans);font-size:var(--text-sm);
        color:var(--color-text-muted);padding:var(--space-4) 0;">${msg}</p>`;
    }

    // ── Modal ────────────────────────────────────
    const overlay = document.getElementById('modal-overlay');

    function buildCarousel(container, files, base, isVideo) {
      const carousel = document.createElement('div');
      carousel.className = 'modal__carousel';
      carousel.style.flex = '1';
      files.forEach((file, i) => {
        const slide = document.createElement('div');
        slide.className = 'modal__slide' + (i === 0 ? ' active' : '');
        if (isVideo) {
          slide.innerHTML = `<video src="${base}${file}" controls playsinline style="width:100%;max-height:100%;"></video>`;
        } else {
          slide.innerHTML = `<img src="${base}${file}" alt="Imagen ${i+1}" />`;
        }
        carousel.appendChild(slide);
      });
      container.appendChild(carousel);
      if (files.length > 1) {
        const counter = document.createElement('div');
        counter.className = 'modal__counter';
        counter.textContent = `1 / ${files.length}`;
        carousel.appendChild(counter);
        const prev = document.createElement('button');
        prev.className = 'modal__arrow modal__arrow--prev hidden';
        prev.innerHTML = '‹';
        const next = document.createElement('button');
        next.className = 'modal__arrow modal__arrow--next';
        next.innerHTML = '›';
        carousel.appendChild(prev);
        carousel.appendChild(next);
        const dotsEl = document.createElement('div');
        dotsEl.className = 'modal__dots';
        files.forEach((_, i) => {
          const dot = document.createElement('button');
          dot.className = 'modal__dot' + (i === 0 ? ' active' : '');
          dotsEl.appendChild(dot);
        });
        carousel.appendChild(dotsEl);
        let current = 0;
        const slides = carousel.querySelectorAll('.modal__slide');
        const dots   = dotsEl.querySelectorAll('.modal__dot');
        function goTo(n) {
          slides[current].classList.remove('active');
          dots[current].classList.remove('active');
          current = (n + files.length) % files.length;
          slides[current].classList.add('active');
          dots[current].classList.add('active');
          counter.textContent = `${current + 1} / ${files.length}`;
          prev.classList.toggle('hidden', current === 0);
          next.classList.toggle('hidden', current === files.length - 1);
        }
        prev.addEventListener('click', () => goTo(current - 1));
        next.addEventListener('click', () => goTo(current + 1));
        dots.forEach((dot, i) => dot.addEventListener('click', () => goTo(i)));
      }
    }

    function openModal(item) {
      const archivos = item.archivos || (item.archivo ? [item.archivo] : []);
      const fotos  = archivos.filter(f => /\.(jpe?g|png|webp|gif)$/i.test(f));
      const videos = archivos.filter(f => /\.(mp4|webm|mov)$/i.test(f));
      const base   = `blog/media/${item.slug}/`;
      const left   = document.getElementById('modal-left');
      left.innerHTML = '';

      if (fotos.length && videos.length) {
        const tabBar = document.createElement('div');
        tabBar.className = 'modal__tabs';
        ['foto','video'].forEach(t => {
          const btn = document.createElement('button');
          btn.className = 'modal__tab' + (t === 'foto' ? ' active' : '');
          btn.textContent = t === 'foto' ? 'Foto' : 'Video';
          btn.addEventListener('click', () => {
            document.querySelectorAll('.modal__tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('[data-group]').forEach(g => {
              g.style.display = g.dataset.group === t ? 'flex' : 'none';
            });
          });
          tabBar.appendChild(btn);
        });
        left.appendChild(tabBar);
        [['foto', fotos, false], ['video', videos, true]].forEach(([t, files, isVid]) => {
          const g = document.createElement('div');
          g.dataset.group = t;
          g.style.cssText = `display:${t==='foto'?'flex':'none'};flex-direction:column;flex:1;`;
          buildCarousel(g, files, base, isVid);
          left.appendChild(g);
        });
      } else if (fotos.length) {
        buildCarousel(left, fotos, base, false);
      } else if (videos.length) {
        buildCarousel(left, videos, base, true);
      }

      document.getElementById('modal-tipo').textContent  = item.tipo;
      document.getElementById('modal-title').textContent = item.titulo;
      document.getElementById('modal-fecha').textContent = item.fecha;
      document.getElementById('modal-desc').textContent  = item.descripcion;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { document.getElementById('modal-left').innerHTML = ''; }, 200);
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Media preview (3 recientes) ──────────────
    fetch('blog/media/media.json')
      .then(r => r.json())
      .then(items => {
        const el = document.getElementById('media-preview');
        const top = items.filter(i => i.destacado)
          .concat(items.filter(i => !i.destacado))
          .slice(0, 3);
        if (!top.length) { empty(el, 'Próximamente.'); return; }
        top.forEach(item => {
          const archivos = item.archivos || (item.archivo ? [item.archivo] : []);
          const primerArchivo = archivos[0] || '';
          const esVideo = /\.(mp4|webm|mov)$/i.test(primerArchivo);
          const thumb = esVideo
            ? `<video src="blog/media/${item.slug}/${primerArchivo}" muted playsinline preload="metadata" style="pointer-events:none;"></video>`
            : primerArchivo
              ? `<img src="blog/media/${item.slug}/${primerArchivo}" alt="${item.titulo}" />`
              : '';
          const card = document.createElement('div');
          card.className = 'media-card';
          card.innerHTML = `
            <div class="media-card__thumb">${thumb}</div>
            <div class="media-card__body">
              <p class="media-card__title">${item.titulo}</p>
              <p class="media-card__desc">${item.descripcion}</p>
            </div>`;
          card.addEventListener('click', () => openModal(item));
          el.appendChild(card);
        });
      })
      .catch(() => empty(document.getElementById('media-preview'),
        'Abre el sitio con <code>python -m http.server</code> para ver el contenido.'));

    // ── Frases preview (3 recientes) ─────────────
    fetch('blog/frases/frases.json')
      .then(r => r.json())
      .then(items => {
        const el = document.getElementById('frases-preview');
        const top = items.filter(i => i.destacado)
          .concat(items.filter(i => !i.destacado))
          .slice(0, 3);
        if (!top.length) { empty(el, 'Próximamente.'); return; }
        top.forEach(item => {
          const div = document.createElement('div');
          div.className = 'frase-preview-item';
          div.innerHTML = `
            <p class="frase-preview-item__text">"${item.texto}"</p>
            ${item.autor ? `<p class="frase-preview-item__author">— ${item.autor}</p>` : ''}`;
          el.appendChild(div);
        });
      })
      .catch(() => empty(document.getElementById('frases-preview'),
        'Abre el sitio con <code>python -m http.server</code> para ver el contenido.'));

    // ── Ensayos preview (3 recientes) ────────────
    fetch('blog/ensayos/ensayos.json')
      .then(r => r.json())
      .then(items => {
        const el = document.getElementById('ensayos-preview');
        const top = items.filter(i => i.destacado)
          .concat(items.filter(i => !i.destacado))
          .slice(0, 3);
        if (!top.length) { empty(el, 'Próximamente.'); return; }
        top.forEach(item => {
          const a = document.createElement('a');
          a.href      = `blog/ensayos/${item.slug}/index.html`;
          a.className = 'ensayo-preview-item';
          a.innerHTML = `
            <span class="ensayo-preview-item__date">${item.fecha}</span>
            <div>
              <p class="ensayo-preview-item__title">${item.titulo}</p>
              <p class="ensayo-preview-item__excerpt">${item.extracto}</p>
            </div>`;
          el.appendChild(a);
        });
      })
      .catch(() => empty(document.getElementById('ensayos-preview'),
        'Abre el sitio con <code>python -m http.server</code> para ver el contenido.'));
  </script>

</body>
</html>
