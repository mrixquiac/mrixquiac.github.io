<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Marcelo Ixquiac</title>
  <meta name="description" content="Ensayos, fotografía, video y frases." />
  <link rel="stylesheet" href="style.css" />
  <style>

    .page-header {
      padding-top:    var(--space-20);
      padding-bottom: var(--space-12);
      border-bottom:  1px solid var(--color-border);
      margin-bottom:  var(--space-20);
    }

    .page-header__title {
      font-size:      var(--text-4xl);
      letter-spacing: -0.025em;
      margin-bottom:  var(--space-5);
      margin-top:     var(--space-4);
    }

    .page-header__lead {
      max-width:   520px;
      color:       var(--color-text-muted);
      font-size:   var(--text-md);
      line-height: var(--leading-relaxed);
    }

    /* ── Bloque de cada sección ── */
    .blog-section {
      margin-bottom: var(--space-24);
    }

    .blog-section__header {
      display:         flex;
      align-items:     baseline;
      justify-content: space-between;
      padding-bottom:  var(--space-6);
      border-bottom:   1px solid var(--color-border);
      margin-bottom:   var(--space-10);
    }

    .blog-section__title {
      font-family:    var(--font-serif);
      font-size:      var(--text-2xl);
      font-weight:    var(--weight-semibold);
      letter-spacing: -0.015em;
    }

    /* ── Grid de media (3 columnas) ── */
    .media-grid {
      display:               grid;
      grid-template-columns: repeat(3, 1fr);
      gap:                   var(--space-6);
    }

    .media-card {
      display:        flex;
      flex-direction: column;
      border:         1px solid var(--color-border);
      border-radius:  var(--radius-lg);
      overflow:       hidden;
      background:     var(--color-bg-pure);
      transition:     box-shadow var(--transition-base);
      text-decoration: none;
    }

    .media-card:hover {
      box-shadow: var(--shadow-card);
    }

    .media-card__thumb {
      width:           100%;
      aspect-ratio:    4 / 3;
      background:      var(--color-accent-light);
      display:         flex;
      align-items:     center;
      justify-content: center;
      overflow:        hidden;
      flex-shrink:     0;
    }

    .media-card__thumb img,
    .media-card__thumb video {
      width:      100%;
      height:     100%;
      object-fit: cover;
    }

    .media-card__thumb-placeholder {
      font-family: var(--font-sans);
      font-size:   var(--text-xs);
      color:       var(--color-text-muted);
    }

    .media-card__body {
      padding: var(--space-5);
    }

    .media-card__title {
      font-family:   var(--font-serif);
      font-size:     var(--text-md);
      font-weight:   var(--weight-semibold);
      color:         var(--color-text);
      margin-bottom: var(--space-2);
      line-height:   var(--leading-snug);
      transition:    color var(--transition-fast);
    }

    .media-card:hover .media-card__title {
      color: var(--color-accent);
    }

    .media-card__desc {
      font-family: var(--font-sans);
      font-size:   var(--text-sm);
      color:       var(--color-text-muted);
      line-height: var(--leading-normal);
    }

    /* ── Frases preview ── */
    .frases-preview {
      display:        flex;
      flex-direction: column;
      gap:            0;
    }

    .frase-preview-item {
      padding:       var(--space-6) 0;
      border-bottom: 1px solid var(--color-border);
    }

    .frase-preview-item:first-child {
      border-top: 1px solid var(--color-border);
    }

    .frase-preview-item__text {
      font-family:  var(--font-serif);
      font-size:    var(--text-lg);
      font-style:   italic;
      color:        var(--color-text);
      line-height:  var(--leading-relaxed);
      margin-bottom: var(--space-2);
    }

    .frase-preview-item__author {
      font-family: var(--font-sans);
      font-size:   var(--text-sm);
      color:       var(--color-text-muted);
    }

    /* ── Ensayos preview ── */
    .ensayo-preview-item {
      display:     grid;
      grid-template-columns: 80px 1fr;
      gap:         var(--space-6);
      align-items: start;
      padding:     var(--space-6) 0;
      border-bottom: 1px solid var(--color-border);
      text-decoration: none;
    }

    .ensayo-preview-item:first-child {
      border-top: 1px solid var(--color-border);
    }

    .ensayo-preview-item__date {
      font-family: var(--font-sans);
      font-size:   var(--text-sm);
      color:       var(--color-text-muted);
      padding-top: 0.2em;
    }

    .ensayo-preview-item__title {
      font-family:   var(--font-serif);
      font-size:     var(--text-xl);
      font-weight:   var(--weight-semibold);
      color:         var(--color-text);
      margin-bottom: var(--space-2);
      line-height:   var(--leading-snug);
      transition:    color var(--transition-fast);
    }

    .ensayo-preview-item:hover .ensayo-preview-item__title {
      color: var(--color-accent);
    }

    .ensayo-preview-item__excerpt {
      font-family: var(--font-sans);
      font-size:   var(--text-sm);
      color:       var(--color-text-muted);
      line-height: var(--leading-normal);
    }

    @media (max-width: 768px) {
      .media-grid { grid-template-columns: 1fr 1fr; }
      .page-header { padding-top: var(--space-12); margin-bottom: var(--space-16); }
      .page-header__title { font-size: var(--text-3xl); }
    }

    /* ── Modal ── */
    .modal-overlay {
      display:         none;
      position:        fixed;
      inset:           0;
      background:      rgba(10, 14, 20, 0.82);
      z-index:         1000;
      align-items:     center;
      justify-content: center;
      padding:         var(--space-6);
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background:    var(--color-bg-pure);
      border-radius: 16px;
      max-width:     820px;
      width:         100%;
      max-height:    90vh;
      overflow-y:    auto;
      position:      relative;
      box-shadow:    0 24px 64px rgba(0,0,0,0.35);
      animation:     modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }

    .modal__close {
      position:      absolute;
      top:           var(--space-4);
      right:         var(--space-4);
      width:         34px;
      height:        34px;
      border:        1px solid var(--color-border);
      border-radius: 50%;
      background:    var(--color-bg-pure);
      display:       flex;
      align-items:   center;
      justify-content: center;
      cursor:        pointer;
      font-size:     1rem;
      color:         var(--color-text-muted);
      z-index:       10;
      transition:    background var(--transition-fast), color var(--transition-fast);
    }
    .modal__close:hover { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }

    .modal__media {
      width:         100%;
      background:    #000;
      border-radius: 16px 16px 0 0;
      overflow:      hidden;
      max-height:    480px;
      display:       flex;
      align-items:   center;
      justify-content: center;
    }
    .modal__media img  { width: 100%; max-height: 480px; object-fit: contain; display: block; }
    .modal__media video { width: 100%; max-height: 480px; display: block; }

    .modal__media-tabs {
      display:       flex;
      gap:           var(--space-2);
      padding:       var(--space-4) var(--space-6) 0;
      border-bottom: 1px solid var(--color-border);
      background:    var(--color-bg-pure);
    }
    .modal__media-tab {
      font-family: var(--font-sans); font-size: var(--text-xs);
      font-weight: var(--weight-semibold); letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--color-text-muted);
      padding: 0.4em 0.8em; border-radius: var(--radius-sm);
      cursor: pointer; border: none; background: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .modal__media-tab.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }

    .modal__body { padding: var(--space-7) var(--space-8) var(--space-8); }

    .modal__meta { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-3); }
    .modal__tipo  { font-family: var(--font-sans); font-size: 0.62rem; font-weight: var(--weight-semibold); letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }
    .modal__fecha { font-family: var(--font-sans); font-size: var(--text-xs); color: var(--color-text-muted); }
    .modal__title { font-family: var(--font-serif); font-size: var(--text-2xl); font-weight: var(--weight-semibold); letter-spacing: -0.015em; color: var(--color-text); margin-bottom: var(--space-5); line-height: var(--leading-snug); }
    .modal__desc  { font-family: var(--font-serif); font-size: var(--text-md); color: var(--color-text); line-height: var(--leading-relaxed); }

    .media-card { cursor: pointer; }

    @media (max-width: 768px) {
      .modal { max-height: 96vh; }
      .modal__body { padding: var(--space-5) var(--space-5) var(--space-6); }
    }

    @media (max-width: 480px) {
      .media-grid { grid-template-columns: 1fr; }
      .ensayo-preview-item { grid-template-columns: 1fr; gap: var(--space-2); }
      .ensayo-preview-item__date { font-size: var(--text-xs); }
    }

  </style>
</head>
<body>

  <nav class="nav" id="main-nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Marcelo Ixquiac</a>
      <ul class="nav__links">
        <li><a href="about.html"    class="nav__link">Sobre mí</a></li>
        <li><a href="projects.html" class="nav__link">Proyectos</a></li>
        <li><a href="blog.html"     class="nav__link active">Blog</a></li>
        <li><a href="now.html"      class="nav__link">Ahora</a></li>
        <li><a href="contact.html"  class="nav__link">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container container--content">

      <header class="page-header">
        <p class="section-label">Blog</p>
        <h1 class="page-header__title">Escritura, imagen y pensamiento</h1>
        <p class="page-header__lead">
          Un espacio para ensayos, fotografía, video y frases que vale
          la pena guardar.
        </p>
      </header>

      <!-- ── MEDIA ──────────────────────────────── -->
      <section class="blog-section" id="section-media">
        <div class="blog-section__header">
          <h2 class="blog-section__title">Media</h2>
          <a href="blog/media/index.html" class="cta" style="font-size:var(--text-sm);">
            Ver todo <span class="arrow">→</span>
          </a>
        </div>
        <!-- Cargado desde media.json -->
        <div class="media-grid" id="media-preview"></div>
      </section>

      <!-- ── FRASES ─────────────────────────────── -->
      <section class="blog-section" id="section-frases">
        <div class="blog-section__header">
          <h2 class="blog-section__title">Frases</h2>
          <a href="blog/frases/index.html" class="cta" style="font-size:var(--text-sm);">
            Ver todo <span class="arrow">→</span>
          </a>
        </div>
        <!-- Cargado desde frases.json -->
        <div class="frases-preview" id="frases-preview"></div>
      </section>

      <!-- ── ENSAYOS ────────────────────────────── -->
      <section class="blog-section" id="section-ensayos">
        <div class="blog-section__header">
          <h2 class="blog-section__title">Ensayos</h2>
          <a href="blog/ensayos/index.html" class="cta" style="font-size:var(--text-sm);">
            Ver todo <span class="arrow">→</span>
          </a>
        </div>
        <!-- Cargado desde ensayos.json -->
        <div id="ensayos-preview"></div>
      </section>

    </div>
  </main>

  <!-- ── MODAL MEDIA ── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal__close" id="modal-close">✕</button>
      <div class="modal__media" id="modal-media"></div>
      <div class="modal__body">
        <div class="modal__meta">
          <span class="modal__tipo"  id="modal-tipo"></span>
          <span class="modal__fecha" id="modal-fecha"></span>
        </div>
        <h2 class="modal__title" id="modal-title"></h2>
        <p  class="modal__desc"  id="modal-desc"></p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__copy">Marcelo Ixquiac &copy; 2025</p>
      <div class="footer__links">
        <a href="mailto:tu@email.com"             class="footer__link">Email</a>
        <a href="https://github.com/tuusuario"     class="footer__link" target="_blank">GitHub</a>
        <a href="https://linkedin.com/in/tuperfil" class="footer__link" target="_blank">LinkedIn</a>
      </div>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });

    // ── Helpers ─────────────────────────────────
    function empty(el, msg) {
      el.innerHTML = `<p style="font-family:var(--font-sans);font-size:var(--text-sm);
        color:var(--color-text-muted);padding:var(--space-4) 0;">${msg}</p>`;
    }

    // ── Modal ────────────────────────────────────
    const overlay    = document.getElementById('modal-overlay');
    const modalMedia = document.getElementById('modal-media');
    const modalTipo  = document.getElementById('modal-tipo');
    const modalFecha = document.getElementById('modal-fecha');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc  = document.getElementById('modal-desc');

    function openModal(item) {
      const archivos = item.archivos || (item.archivo ? [item.archivo] : []);
      const fotos  = archivos.filter(f => /\.(jpe?g|png|webp|gif)$/i.test(f));
      const videos = archivos.filter(f => /\.(mp4|webm|mov)$/i.test(f));
      const base   = `blog/media/${item.slug}/`;
      let html = '';

      if (fotos.length && videos.length) {
        html = `<div class="modal__media-tabs" id="media-tabs">
          <button class="modal__media-tab active" data-target="tab-foto">Foto</button>
          <button class="modal__media-tab"        data-target="tab-video">Video</button>
        </div>
        <div id="tab-foto">${fotos.map(f=>`<img src="${base}${f}" alt="${item.titulo}"/>`).join('')}</div>
        <div id="tab-video" style="display:none;">${videos.map(v=>`<video src="${base}${v}" controls playsinline></video>`).join('')}</div>`;
      } else if (fotos.length) {
        html = fotos.map(f => `<img src="${base}${f}" alt="${item.titulo}"/>`).join('');
      } else if (videos.length) {
        html = videos.map(v => `<video src="${base}${v}" controls playsinline></video>`).join('');
      }

      modalMedia.innerHTML    = html;
      modalTipo.textContent   = item.tipo;
      modalFecha.textContent  = '· ' + item.fecha;
      modalTitle.textContent  = item.titulo;
      modalDesc.textContent   = item.descripcion;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      // Tabs si hay foto+video
      document.querySelectorAll('.modal__media-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.modal__media-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.querySelectorAll('[id^="tab-"]').forEach(el => {
            el.style.display = el.id === tab.dataset.target ? '' : 'none';
          });
        });
      });
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      modalMedia.innerHTML = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Media preview (3 recientes) ──────────────
    fetch('blog/media/media.json')
      .then(r => r.json())
      .then(items => {
        const el = document.getElementById('media-preview');
        const top = items.filter(i => i.destacado)
          .concat(items.filter(i => !i.destacado))
          .slice(0, 3);
        if (!top.length) { empty(el, 'Próximamente.'); return; }
        top.forEach(item => {
          const archivos = item.archivos || (item.archivo ? [item.archivo] : []);
          const primerArchivo = archivos[0] || '';
          const esVideo = /\.(mp4|webm|mov)$/i.test(primerArchivo);
          const thumb = esVideo
            ? `<video src="blog/media/${item.slug}/${primerArchivo}" muted playsinline preload="metadata" style="pointer-events:none;"></video>`
            : primerArchivo
              ? `<img src="blog/media/${item.slug}/${primerArchivo}" alt="${item.titulo}" />`
              : '';
          const card = document.createElement('div');
          card.className = 'media-card';
          card.innerHTML = `
            <div class="media-card__thumb">${thumb}</div>
            <div class="media-card__body">
              <p class="media-card__title">${item.titulo}</p>
              <p class="media-card__desc">${item.descripcion}</p>
            </div>`;
          card.addEventListener('click', () => openModal(item));
          el.appendChild(card);
        });
      })
      .catch(() => empty(document.getElementById('media-preview'),
        'Abre el sitio con <code>python -m http.server</code> para ver el contenido.'));

    // ── Frases preview (3 recientes) ─────────────
    fetch('blog/frases/frases.json')
      .then(r => r.json())
      .then(items => {
        const el = document.getElementById('frases-preview');
        const top = items.filter(i => i.destacado)
          .concat(items.filter(i => !i.destacado))
          .slice(0, 3);
        if (!top.length) { empty(el, 'Próximamente.'); return; }
        top.forEach(item => {
          const div = document.createElement('div');
          div.className = 'frase-preview-item';
          div.innerHTML = `
            <p class="frase-preview-item__text">"${item.texto}"</p>
            ${item.autor ? `<p class="frase-preview-item__author">— ${item.autor}</p>` : ''}`;
          el.appendChild(div);
        });
      })
      .catch(() => empty(document.getElementById('frases-preview'),
        'Abre el sitio con <code>python -m http.server</code> para ver el contenido.'));

    // ── Ensayos preview (3 recientes) ────────────
    fetch('blog/ensayos/ensayos.json')
      .then(r => r.json())
      .then(items => {
        const el = document.getElementById('ensayos-preview');
        const top = items.filter(i => i.destacado)
          .concat(items.filter(i => !i.destacado))
          .slice(0, 3);
        if (!top.length) { empty(el, 'Próximamente.'); return; }
        top.forEach(item => {
          const a = document.createElement('a');
          a.href      = `blog/ensayos/${item.slug}/index.html`;
          a.className = 'ensayo-preview-item';
          a.innerHTML = `
            <span class="ensayo-preview-item__date">${item.fecha}</span>
            <div>
              <p class="ensayo-preview-item__title">${item.titulo}</p>
              <p class="ensayo-preview-item__excerpt">${item.extracto}</p>
            </div>`;
          el.appendChild(a);
        });
      })
      .catch(() => empty(document.getElementById('ensayos-preview'),
        'Abre el sitio con <code>python -m http.server</code> para ver el contenido.'));
  </script>

</body>
</html>
